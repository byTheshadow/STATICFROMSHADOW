<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - SIGNAL LOST</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
  
  <style>
    /* ========== BLOCK: 404 Page Styles START ========== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'IBM Plex Mono', 'Noto Sans SC', monospace;
      background: #0a0a0f;
      color: #e8e0d0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .noise-bg {
      position: fixed;
      inset: 0;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" /></filter><rect width="100%" height="100%" filter="url(%23noise)" opacity="0.05"/></svg>');
      animation: noiseMove 0.2s infinite;
      pointer-events: none;
    }

    @keyframes noiseMove {
      0%, 100% { transform: translate(0, 0); }
      10% { transform: translate(-5%, -5%); }
      20% { transform: translate(-10%, 5%); }
      30% { transform: translate(5%, -10%); }
      40% { transform: translate(-5%, 15%); }
      50% { transform: translate(-10%, 5%); }
      60% { transform: translate(15%, 0); }
      70% { transform: translate(0, 10%); }
      80% { transform: translate(-15%, 0); }
      90% { transform: translate(10%, 5%); }
    }

    .error-container {
      text-align: center;
      z-index: 1;
      padding: 2rem;
    }

    .error-code {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(6rem, 20vw, 12rem);
      letter-spacing: 0.1em;
      color: #cf5a5a;
      line-height: 1;
      margin-bottom: 1rem;
      animation: glitchError 3s infinite;
      text-shadow: 
        2px 2px 0 #8a6bbf,
        -2px -2px 0 #cf5a5a;
    }

    @keyframes glitchError {
      0%, 100% { 
        transform: translate(0);
        text-shadow: 2px 2px 0 #8a6bbf, -2px -2px 0 #cf5a5a;
      }
      25% { 
        transform: translate(-5px, 5px);
        text-shadow: 5px 5px 0 #8a6bbf, -5px -5px 0 #cf5a5a;
      }
      50% { 
        transform: translate(5px, -5px);
        text-shadow: -5px -5px 0 #8a6bbf, 5px 5px 0 #cf5a5a;
      }
      75% { 
        transform: translate(-3px, -3px);
        text-shadow: 3px 3px 0 #8a6bbf, -3px -3px 0 #cf5a5a;
      }
    }

    .error-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2rem, 6vw, 4rem);
      letter-spacing: 0.15em;
      margin-bottom: 1.5rem;
      color: #e8e0d0;
      animation: flicker 4s infinite;
    }

    @keyframes flicker {
      0%, 100% { opacity: 1; }
      41%, 43% { opacity: 0.4; }
      45%, 47% { opacity: 0.8; }
      49% { opacity: 0.3; }
      51% { opacity: 1; }
    }

    .error-message {
      font-size: 1.125rem;
      color: #a8a0a0;
      margin-bottom: 1rem;
      letter-spacing: 0.05em;
      line-height: 1.8;
    }

    .error-submessage {
      font-size: 0.875rem;
      color: #6a6a7a;
      margin-bottom: 3rem;
      letter-spacing: 0.1em;
    }

    .tape-icon {
      width: 120px;
      height: 80px;
      margin: 2rem auto;
      border: 2px solid #8a6bbf;
      border-radius: 8px;
      position: relative;
      background: rgba(138, 107, 191, 0.1);
    }

    .tape-reel {
      width: 30px;
      height: 30px;
      border: 2px solid #8a6bbf;
      border-radius: 50%;
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
    }

    .tape-reel.left {
      left: 20px;
      animation: reelSpin 2s linear infinite reverse;
    }

    .tape-reel.right {
      right: 20px;
      animation: reelSpin 2s linear infinite;
    }

    .tape-reel::after {
      content: '';
      position: absolute;
      inset: 6px;
      border: 1px solid #8a6bbf;
      border-radius: 50%;
    }

    @keyframes reelSpin {
      to { transform: translateY(-50%) rotate(360deg); }
    }

    .back-button {
      display: inline-block;
      padding: 1rem 2.5rem;
      background: rgba(138, 107, 191, 0.2);
      border: 2px solid #8a6bbf;
      border-radius: 8px;
      color: #b89fdf;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      font-family: 'Bebas Neue', sans-serif;
    }

    .back-button:hover {
      background: rgba(138, 107, 191, 0.4);
      border-color: #b89fdf;
      color: #e8e0d0;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(138, 107, 191, 0.3);
    }

    .scanlines {
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        rgba(0, 0, 0, 0.15) 0px,
        transparent 1px,
        transparent 2px,
        rgba(0, 0, 0, 0.15) 3px
      );
      pointer-events: none;
      animation: scanlineMove 8s linear infinite;
    }

    @keyframes scanlineMove {
      0% { transform: translateY(0); }
      100% { transform: translateY(100%); }
    }
    /* ========== BLOCK: 404 Page Styles END ========== */
  </style>
</head>
<body>
  
  <!-- ========== BLOCK: 404 Content START ========== -->
  <div class="noise-bg"></div>
  <div class="scanlines"></div>
  
  <div class="error-container">
    <div class="error-code">404</div>
    <h1 class="error-title">SIGNAL LOST</h1>
    <p class="error-message">你找的那盘磁带不在档案馆里。</p>
    <p class="error-submessage">ERROR 404 // TAPE NOT FOUND</p>
    
    <div class="tape-icon">
      <div class="tape-reel left"></div>
      <div class="tape-reel right"></div>
    </div>
    
    <a href="/" class="back-button">返回档案馆</a>
  </div>
  <!-- ========== BLOCK: 404 Content END ========== -->
  
</body>
</html>
