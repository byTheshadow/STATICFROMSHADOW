<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - SIGNAL LOST</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Courier+Prime:wght@400;700&family=Zhi+Mang+Xing&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
  
  <style>
    /* ========== BLOCK: 404 Page Styles START ========== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Courier Prime', 'Noto Sans SC', monospace;
      background: #0a0a0a;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .noise-bg {
      position: fixed;
      inset: 0;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" /></filter><rect width="100%" height="100%" filter="url(%23noise)" opacity="0.08"/></svg>');
      animation: noiseMove 0.15s infinite;
      pointer-events: none;
    }

    @keyframes noiseMove {
      0%, 100% { transform: translate(0, 0); }
      10% { transform: translate(-5%, -5%); }
      20% { transform: translate(-10%, 5%); }
      30% { transform: translate(5%, -10%); }
      40% { transform: translate(-5%, 15%); }
      50% { transform: translate(-10%, 5%); }
      60% { transform: translate(15%, 0); }
      70% { transform: translate(0, 10%); }
      80% { transform: translate(-15%, 0); }
      90% { transform: translate(10%, 5%); }
    }

    .error-container {
      text-align: center;
      z-index: 1;
      padding: 2rem;
    }

    .error-code {
      font-family: 'Permanent Marker', sans-serif;
      font-size: clamp(6rem, 20vw, 14rem);
      letter-spacing: 0.05em;
      color: #d62828;
      line-height: 1;
      margin-bottom: 1rem;
      animation: glitchError 2.5s infinite;
      text-shadow: 
        3px 3px 0 #7b2cbf,
        -3px -3px 0 #d62828,
        0 0 30px rgba(214, 40, 40, 0.7);
      transform: rotate(-2deg);
    }

    @keyframes glitchError {
      0%, 100% { 
        transform: rotate(-2deg) translate(0);
        text-shadow: 3px 3px 0 #7b2cbf, -3px -3px 0 #d62828, 0 0 30px rgba(214, 40, 40, 0.7);
      }
      25% { 
        transform: rotate(-2deg) translate(-6px, 6px);
        text-shadow: 6px 6px 0 #7b2cbf, -6px -6px 0 #d62828, 0 0 40px rgba(214, 40, 40, 0.9);
      }
      50% { 
        transform: rotate(-2deg) translate(6px, -6px);
        text-shadow: -6px -6px 0 #7b2cbf, 6px 6px 0 #d62828, 0 0 40px rgba(214, 40, 40, 0.9);
      }
      75% { 
        transform: rotate(-2deg) translate(-4px, -4px);
        text-shadow: 4px 4px 0 #7b2cbf, -4px -4px 0 #d62828, 0 0 35px rgba(214, 40, 40, 0.8);
      }
    }

    .error-title {
      font-family: 'Permanent Marker', sans-serif;
      font-size: clamp(2rem, 6vw, 4.5rem);
      letter-spacing: 0.1em;
      margin-bottom: 1.5rem;
      color: #f0f0f0;
      animation: flicker 3s infinite;
      text-shadow: 0 0 20px rgba(214, 40, 40, 0.6);
    }

    @keyframes flicker {
      0%, 100% { opacity: 1; }
      41%, 43% { opacity: 0.3; }
      45%, 47% { opacity: 0.9; }
      49% { opacity: 0.2; }
      51% { opacity: 1; }
    }

    .error-message {
      font-family: 'Zhi Mang Xing', 'Noto Sans SC', cursive;
      font-size: 1.5rem;
      color: #b0b0b0;
      margin-bottom: 1rem;
      letter-spacing: 0.05em;
      line-height: 1.8;
    }

    .error-submessage {
      font-size: 0.875rem;
      color: #707070;
      margin-bottom: 3rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .tape-icon {
      width: 140px;
      height: 90px;
      margin: 2rem auto;
      border: 3px solid #d62828;
      border-radius: 10px;
      position: relative;
      background: rgba(214, 40, 40, 0.1);
      box-shadow: 0 0 30px rgba(214, 40, 40, 0.4);
    }

    .tape-reel {
      width: 35px;
      height: 35px;
      border: 3px solid #d62828;
      border-radius: 50%;
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: #0a0a0a;
    }

    .tape-reel.left {
      left: 22px;
      animation: reelSpin 2s linear infinite reverse;
    }

    .tape-reel.right {
      right: 22px;
      animation: reelSpin 2s linear infinite;
    }
    .tape-reel::after {
      content: '';
      position: absolute;
      inset: 8px;
      border: 2px solid #d62828;
      border-radius: 50%;
    }

    .tape-reel::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 8px;
      height: 8px;
      background: #d62828;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 10px rgba(214, 40, 40, 0.8);
    }

    @keyframes reelSpin {
      to { transform: translateY(-50%) rotate(360deg); }
    }

    .back-button {
      display: inline-block;
      padding: 1rem 2.5rem;
      background: rgba(214, 40, 40, 0.2);
      border: 3px solid #d62828;
      border-radius: 10px;
      color: #ff4444;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      text-decoration: none;
      font-family: 'Permanent Marker', sans-serif;
      position: relative;
      overflow: hidden;
    }

    .back-button::before {
      content: '';
      position: absolute;
      inset: 0;
      background: #d62828;
      transform: translateX(-100%);
      transition: transform 0.4s ease;
      z-index: -1;
    }

    .back-button:hover::before {
      transform: translateX(0);
    }

    .back-button:hover {
      border-color: #ff4444;
      color: #f0f0f0;
      transform: translateY(-5px) rotate(-2deg);
      box-shadow: 0 10px 30px rgba(214, 40, 40, 0.5);
    }

    .scanlines {
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        rgba(0, 0, 0, 0.2) 0px,
        transparent 1px,
        transparent 2px,
        rgba(0, 0, 0, 0.2) 3px
      );
      pointer-events: none;
      animation: scanlineMove 8s linear infinite;
      opacity: 0.1;
    }

    @keyframes scanlineMove {
      0% { transform: translateY(0); }
      100% { transform: translateY(100%); }
    }

    .red-glow {
      position: fixed;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(214, 40, 40, 0.3), transparent);
      border-radius: 50%;
      filter: blur(80px);
      animation: glowPulse 4s ease-in-out infinite;
      pointer-events: none;
    }

    .red-glow.glow-1 {
      top: 10%;
      left: 20%;
      animation-delay: 0s;
    }

    .red-glow.glow-2 {
      bottom: 15%;
      right: 25%;
      animation-delay: 2s;
    }

    @keyframes glowPulse {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.2); }
    }
    /* ========== BLOCK: 404 Page Styles END ========== */
  </style>
</head>
<body>
  
  <!-- ========== BLOCK: 404 Content START ========== -->
  <div class="noise-bg"></div>
  <div class="scanlines"></div>
  <div class="red-glow glow-1"></div>
  <div class="red-glow glow-2"></div>
  
  <div class="error-container">
    <div class="error-code">404</div>
    <h1 class="error-title">SIGNAL LOST</h1>
    <p class="error-message">你找的那盘磁带不在档案馆里。</p>
    <p class="error-submessage">ERROR 404 // TAPE NOT FOUND</p>
    
    <div class="tape-icon">
      <div class="tape-reel left"></div>
      <div class="tape-reel right"></div>
    </div>
    
    <a href="/" class="back-button">返回档案馆</a>
  </div>
  <!-- ========== BLOCK: 404 Content END ========== -->
  
</body>
</html>
