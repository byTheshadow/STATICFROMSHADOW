<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="STATIC FROM SHADOW — 玉元一的噪音档案，角色卡、美化作品、预设与插件展示">
  <title>STATIC FROM SHADOW — 玉元一的噪音档案</title>
  
  <!-- ========== BLOCK: Google Fonts START ========== -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Ma+Shan+Zheng&family=Long+Cang&family=Special+Elite&family=IBM+Plex+Mono:wght@300;400;500;600&family=Rock+Salt&family=VT323&family=Bungee+Inline&display=swap" rel="stylesheet">
  <!-- ========== BLOCK: Google Fonts END ========== -->
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="style/main.css">
  <link rel="stylesheet" href="style/animations.css">
</head>
<body class="home-page">
  
  <!-- ========== BLOCK: Noise Loader START ========== -->
  <div id="loader" class="noise-overlay active"></div>
  <!-- ========== BLOCK: Noise Loader END ========== -->

  <!-- ========== BLOCK: Navigation START ========== -->
  <nav class="main-nav">
    <div class="nav-container">
      <div class="nav-logo">
        <span class="logo-main">STATIC FROM SHADOW</span>
        <span class="logo-sub">Vol.∞</span>
      </div>
      <ul class="nav-menu">
        <li><a href="#home" class="nav-link active" data-section="home">HOME</a></li>
        <li><a href="#characters" class="nav-link" data-section="characters">角色档案</a></li>
        <li><a href="#beautify" class="nav-link" data-section="beautify">美化拼贴</a></li>
        <li><a href="#presets" class="nav-link" data-section="presets">预设磁带</a></li>
        <li><a href="#plugins" class="nav-link" data-section="plugins">插件黑胶</a></li>
        <li><a href="#projects" class="nav-link" data-section="projects">传送终端</a></li>
      </ul>
      <button class="nav-toggle" aria-label="切换菜单">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </nav>
  <!-- ========== BLOCK: Navigation END ========== -->

  <!-- ========== BLOCK: Main Content START ========== -->
  <main class="main-content">
    
    <!-- ========== SECTION: Home (Livehouse) START ========== -->
    <section id="home" class="content-section active hero-section">
      
      <!-- ========== BLOCK: Background Image Container START ========== -->
      <div class="background-image-container">
        <img src="assets/images/hero-bg.jpg" alt="Livehouse 现场" class="hero-bg-img">
        <div class="vignette-overlay"></div>
        <div class="grain-overlay"></div>
        <div class="light-sweep-effect"></div>
      </div>
      <!-- ========== BLOCK: Background Image Container END ========== -->

      <!-- ========== BLOCK: Miaomiao Printer START ========== -->
      <div class="miaomiao-printer">
        <div class="printer-body">
          <div class="printer-top"></div>
          <div class="printer-slot"></div>
        </div>
        <div class="printer-paper-wrapper">
          <div id="printer-paper" class="printer-paper">
            <!-- 内容由 printer.js 动态生成 -->
          </div>
        </div>
      </div>
      <!-- ========== BLOCK: Miaomiao Printer END ========== -->

      <!-- ========== BLOCK: Decorations START ========== -->
      <div class="decorations">
        
        <!-- 黑胶唱片 -->
        <div id="vinyl-player" class="vinyl-container" title="点击播放氛围音">
          <div class="vinyl-record">
            <div class="vinyl-label">
              <span class="vinyl-text">STATIC</span>
            </div>
          </div>
          <div class="vinyl-arm"></div>
          <audio id="ambient-noise" src="assets/audio/ambient.mp3" loop></audio>
        </div>

        <!-- 散落的磁带 -->
        <div class="cassette cassette-1">
          <div class="cassette-body">
            <div class="cassette-reel left"></div>
            <div class="cassette-reel right"></div>
          </div>
        </div>
        
        <div class="cassette cassette-2">
          <div class="cassette-body">
            <div class="cassette-reel left"></div>
            <div class="cassette-reel right"></div>
          </div>
        </div>

        <!-- 手写便签/票根 -->
        <div class="sticker sticker-ticket">
          <p class="handwriting-font">ADMIT ONE</p>
          <p class="ticket-date">2024.04.19</p>
        </div>

        <div class="sticker sticker-note">
          <p class="handwriting-font">噪音档案</p>
        </div>

      </div>
      <!-- ========== BLOCK: Decorations END ========== -->

      <!-- 滚动指示器 -->
      <div class="scroll-indicator">
        <span>EXPLORE</span>
        <div class="scroll-line"></div>
      </div>

    </section>
    <!-- ========== SECTION: Home (Livehouse) END ========== -->

    <!-- ========== SECTION: Characters START ========== -->
    <section id="characters" class="content-section">
      <div class="section-container">
        <header class="section-header">
          <h2 class="section-title">
            <span class="title-number">01</span>
            <span class="title-text">角色档案馆</span>
            <span class="title-en">CHARACTER ARCHIVE</span>
          </h2>
          <div class="section-filter" id="character-filter">
            <!-- 标签过滤器由 JS 动态生成 -->
          </div>
        </header>
        <div class="character-grid" id="character-grid">
          <!-- 角色卡由 loader.js 从 characters.json 加载 -->
        </div>
      </div>
    </section>
    <!-- ========== SECTION: Characters END ========== -->

    <!-- ========== SECTION: Beautify START ========== -->
    <section id="beautify" class="content-section">
      <div class="section-container">
        <header class="section-header">
          <h2 class="section-title">
            <span class="title-number">02</span>
            <span class="title-text">美化拼贴墙</span>
            <span class="title-en">BEAUTIFY COLLAGE</span>
          </h2>
          <div class="section-controls">
            <div class="section-filter" id="beautify-filter"></div>
            <div class="section-sort">
              <button class="sort-btn active" data-sort="latest">最新</button>
              <button class="sort-btn" data-sort="oldest">最旧</button>
              <button class="sort-btn" data-sort="random">随机</button>
            </div>
          </div>
        </header>
        <div class="beautify-masonry" id="beautify-grid">
          <!-- 美化图由 loader.js 加载 -->
        </div>
      </div>
    </section>
    <!-- ========== SECTION: Beautify END ========== -->

    <!-- ========== SECTION: Presets START ========== -->
    <section id="presets" class="content-section">
      <div class="section-container">
        <header class="section-header">
          <h2 class="section-title">
            <span class="title-number">03</span>
            <span class="title-text">预设磁带柜</span>
            <span class="title-en">PRESET TAPES</span>
          </h2>
        </header>
        <div class="preset-tabs" id="preset-tabs"></div>
        <div class="preset-content" id="preset-content"></div>
      </div>
    </section>
    <!-- ========== SECTION: Presets END ========== -->

    <!-- ========== SECTION: Plugins START ========== -->
    <section id="plugins" class="content-section">
      <div class="section-container">
        <header class="section-header">
          <h2 class="section-title">
            <span class="title-number">04</span>
            <span class="title-text">插件黑胶架</span>
            <span class="title-en">PLUGIN VINYLS</span>
          </h2>
        </header>
        <div class="vinyl-shelf" id="vinyl-shelf"></div>
      </div>
    </section>
    <!-- ========== SECTION: Plugins END ========== -->

    <!-- ========== SECTION: Projects START ========== -->
    <section id="projects" class="content-section">
      <div class="section-container">
        <header class="section-header">
          <h2 class="section-title">
            <span class="title-number">05</span>
            <span class="title-text">传送终端</span>
            <span class="title-en">TRANSMISSION TERMINAL</span>
          </h2>
        </header>
        <div class="terminal-window">
          <div class="terminal-header">
            <span class="terminal-dot red"></span>
            <span class="terminal-dot yellow"></span>
            <span class="terminal-dot green"></span>
            <span class="terminal-title">vibe_coding_projects.sh</span>
          </div>
          <div class="terminal-body" id="terminal-body"></div>
        </div>
      </div>
    </section>
    <!-- ========== SECTION: Projects END ========== -->

  </main>
  <!-- ========== BLOCK: Main Content END ========== -->

  <!-- ========== BLOCK: Lightbox Modal START ========== -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" aria-label="关闭">&times;</button>
    <div class="lightbox-content">
      <img src="" alt="" id="lightbox-img">
      <div class="lightbox-info" id="lightbox-info"></div>
    </div>
    <button class="lightbox-nav prev" aria-label="上一张">‹</button>
    <button class="lightbox-nav next" aria-label="下一张">›</button>
  </div>
  <!-- ========== BLOCK: Lightbox Modal END ========== -->

  <!-- Scripts -->
  <script src="js/printer.js"></script>
  <script src="js/loader.js"></script>
  <script src="js/main.js"></script>
  
</body>
</html>
